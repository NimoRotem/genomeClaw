    # Genomics App — backend API + WebSocket
    location /genomics/api/ {
        proxy_pass http://127.0.0.1:8600/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
    }

    # Genomics App — WebSocket for run progress
    location /genomics/ws/ {
        proxy_pass http://127.0.0.1:8600/ws/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }

    # Genomics App — React frontend (static files)
    location /genomics/ {
        # UPDATE THIS PATH to your installation directory
        alias /home/YOUR_USER/genomics/frontend/dist/;
        try_files $uri $uri/ /genomics/index.html;
    }
