# =============================================================================
# 23andClaude — sample nginx vhost
# =============================================================================
# Drop this into /etc/nginx/sites-available/, edit the certificate paths and
# server_name, then symlink into /etc/nginx/sites-enabled/.
#
# This proxies a single domain to two FastAPI backends:
#   - Genomics dashboard      127.0.0.1:8600 → /
#   - Ancestry inference app  127.0.0.1:8700 → /ancestry/
#
# Both backends share /data and /scratch on the host filesystem.

server {
    server_name example.com www.example.com;

    # -------------------------------------------------------------------------
    # Ancestry sub-app (/ancestry/)
    # -------------------------------------------------------------------------
    location /ancestry/api/ {
        proxy_pass http://127.0.0.1:8700/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 2G;
    }

    location /ancestry/ {
        proxy_pass http://127.0.0.1:8700/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # Main genomics dashboard (/)
    # -------------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8600;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 8G;
    }

    # WebSocket support for run progress
    location /api/runs/ {
        proxy_pass http://127.0.0.1:8600;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8600;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # -------------------------------------------------------------------------
    # TLS — replace with your own cert paths (e.g. from Let's Encrypt / Certbot)
    # -------------------------------------------------------------------------
    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Redirect plain HTTP to HTTPS
server {
    listen 80;
    server_name example.com www.example.com;

    if ($host = www.example.com) {
        return 301 https://$host$request_uri;
    }

    if ($host = example.com) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
