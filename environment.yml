name: genomics
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python>=3.11
  # Bioinformatics tools
  - bcftools>=1.22
  - samtools>=1.22
  - plink2>=2.0
  - bwa>=0.7.19
  - minimap2>=2.30
  - htslib>=1.23
  # System
  - gsl>=2.7
  # Python packages (via pip)
  - pip
  - pip:
    - -r requirements.txt
